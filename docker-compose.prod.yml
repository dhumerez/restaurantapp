services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://humerez.dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/restaurant/}
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.restaurant.rule=Host(`humerez.dev`) && PathPrefix(`/restaurant`)"
      - "traefik.http.routers.restaurant.entrypoints=websecure"
      - "traefik.http.routers.restaurant.tls=true"
      - "traefik.http.routers.restaurant.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.restaurant-strip.stripprefix.prefixes=/restaurant"
      - "traefik.http.routers.restaurant.middlewares=restaurant-strip"
      - "traefik.http.services.restaurant.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - internal
      - web

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  web:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/restaurant
      REDIS_URL: redis://redis:6379
      # Docker bind mounts on Windows/WSL2 don't deliver inotify events, so
      # chokidar (used by tsx watch) silently misses edits. Force polling.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/server/src:/app/apps/server/src
      - ./packages/db/src:/app/packages/db/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    env_file: .env
    environment:
      API_PROXY_TARGET: http://server:3000
      # Force chokidar polling so Vite HMR + TanStack Router file plugin
      # pick up host edits through the Windows/WSL2 bind mount.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules

volumes:
  postgres_data:

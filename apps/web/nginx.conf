server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME type for web manifest
    location = /manifest.webmanifest {
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Never cache service worker or registerSW (required for PWA updates)
    location ~* (sw\.js|registerSW\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Hashed assets (Vite adds content hash) — cache for 1 year
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
